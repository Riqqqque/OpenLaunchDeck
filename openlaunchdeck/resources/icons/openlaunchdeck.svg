<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="OpenLaunchDeck">
  <defs>
    <linearGradient id="shell" x1="72" y1="52" x2="440" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#060b14"/>
    </linearGradient>
    <linearGradient id="edge" x1="118" y1="92" x2="394" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <pattern id="pads" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" rx="7" fill="#273244"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#020617"/>
  <rect x="56" y="56" width="400" height="400" rx="92" fill="url(#shell)" filter="url(#soft)"/>
  <rect x="80" y="80" width="352" height="352" rx="70" fill="none" stroke="url(#edge)" stroke-width="14"/>
  <rect x="112" y="112" width="276" height="276" fill="url(#pads)"/>

  <g>
    <rect x="112" y="112" width="24" height="24" rx="7" fill="#38bdf8"/>
    <rect x="148" y="148" width="24" height="24" rx="7" fill="#22c55e"/>
    <rect x="184" y="184" width="24" height="24" rx="7" fill="#a855f7"/>
    <rect x="220" y="220" width="24" height="24" rx="7" fill="#f97316"/>
    <rect x="256" y="256" width="24" height="24" rx="7" fill="#facc15"/>
    <rect x="292" y="292" width="24" height="24" rx="7" fill="#22c55e"/>
    <rect x="328" y="328" width="24" height="24" rx="7" fill="#38bdf8"/>
    <rect x="364" y="364" width="24" height="24" rx="7" fill="#06b6d4"/>
    <rect x="364" y="112" width="24" height="24" rx="7" fill="#f43f5e"/>
    <rect x="112" y="364" width="24" height="24" rx="7" fill="#06b6d4"/>
  </g>
</svg>
