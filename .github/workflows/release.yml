name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows release
    runs-on: windows-latest

    env:
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install --prefer-binary -r requirements.txt

      - name: Read version and validate tag
        shell: pwsh
        run: |
          $version = (python -c "from openlaunchdeck.version import __version__; print(__version__)").Trim()
          if (!$version) {
            throw "Could not read version from openlaunchdeck/version.py"
          }
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if ($tag -ne "v$version") {
            throw "Release tag $tag does not match app version v$version"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run release tests
        shell: pwsh
        run: python -m pytest -q

      - name: Build release assets
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build.ps1 -RequireInstaller -UseCurrentPython -SkipPipUpgrade -SkipDependencyInstall -SkipTests -FastPackage

      - name: Verify release assets
        shell: pwsh
        run: |
          $assets = @(
            "dist\OpenLaunchDeck-$env:APP_VERSION-Windows.zip",
            "dist\OpenLaunchDeck-$env:APP_VERSION-Windows.zip.sha256",
            "dist\installer\OpenLaunchDeckSetup-$env:APP_VERSION.exe",
            "dist\installer\OpenLaunchDeckSetup-$env:APP_VERSION.exe.sha256"
          )
          foreach ($asset in $assets) {
            if (!(Test-Path $asset)) {
              throw "Missing release asset: $asset"
            }
          }

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            "dist\OpenLaunchDeck-$env:APP_VERSION-Windows.zip",
            "dist\OpenLaunchDeck-$env:APP_VERSION-Windows.zip.sha256",
            "dist\installer\OpenLaunchDeckSetup-$env:APP_VERSION.exe",
            "dist\installer\OpenLaunchDeckSetup-$env:APP_VERSION.exe.sha256"
          )
          $notes = @"
          OpenLaunchDeck $env:APP_VERSION

          Release assets:
          - OpenLaunchDeckSetup-$env:APP_VERSION.exe
          - OpenLaunchDeck-$env:APP_VERSION-Windows.zip
          - SHA256 checksum files for both packages

          Download the installer for normal Windows installs. Use the ZIP for portable testing.
          "@
          $notes | Set-Content -Path release-notes.md -Encoding utf8
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $assets --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $env:RELEASE_TAG $assets --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title "OpenLaunchDeck $env:APP_VERSION" --notes-file release-notes.md
          }
