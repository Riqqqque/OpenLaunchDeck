name: Feature Request
description: Suggest an improvement for OpenLaunchDeck.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Behavior
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add hardware details, workflow details, or links that help explain the request.
